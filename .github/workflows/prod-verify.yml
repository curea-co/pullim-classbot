name: prod-verify

# Production 회귀 자동화 (2026-05-14).
# main push / 일일 schedule / 수동 dispatch 세 경로에서 풀림 클래스봇 production URL에
# Playwright hit하여 색·chat·slider 회귀를 검증한다.
#
# 설계 결정: Vercel API 의존 없음. VERCEL_TOKEN secret 불요.
#  - GitHub ↔ Vercel 자동 deploy webhook이 이미 webhook으로 main push를 잡아주므로,
#    이 워크플로우는 "deploy 완료 후 production URL이 200을 응답할 때까지 polling 후
#    Playwright spec을 prod hit으로 1회 돌린다" 만 책임.
#  - Vercel 배포 상태 자체를 검증할 필요가 생기면 후속 plan에서 commit SHA 임베드 +
#    assert 패턴으로 분리.

on:
  push:
    branches: [main]
  schedule:
    # KST 08:00 = UTC 23:00. 일일 회귀 1회.
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  prod-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROD_URL: https://pullim-classbot.vercel.app
      PLAYWRIGHT_BASE_URL: https://pullim-classbot.vercel.app
      PROD_CAPTURE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bun x playwright install chromium --with-deps

      - name: Wait for production SHA match
        if: github.event_name == 'push'
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # production HTML의 <meta name="x-build-sha" content="<sha>"> 가 expected와 일치할 때까지 polling.
          # Vercel 자동 빌드 ~30~120s + CDN 전파 → 최대 10분(120 × 5s) 대기.
          # 이전 patten(`/` 200 응답만 확인)은 CDN이 stale 빌드 서빙 케이스를 못 잡았음.
          for i in $(seq 1 120); do
            html=$(curl -sS -L "$PROD_URL/classbot/chat" || true)
            current=$(echo "$html" | grep -oE 'name="x-build-sha" content="[^"]+"' | head -1 | sed 's/.*content="\(.*\)"/\1/')
            if [ "$current" = "$EXPECTED_SHA" ]; then
              echo "Production SHA matched (${EXPECTED_SHA:0:12}) after ${i} attempts."
              exit 0
            fi
            echo "Attempt ${i}/120 — expected=${EXPECTED_SHA:0:12} current=${current:0:12} (full=${current:-<no-meta>}), sleeping 5s."
            sleep 5
          done
          echo "Production SHA did not match ${EXPECTED_SHA:0:12} within 10 minutes — Vercel deploy may have been skipped or stuck."
          exit 1

      - name: Run Playwright against production
        # 모든 7 spec이 prod-safe (3 spec은 `process.env.PLAYWRIGHT_BASE_URL ?? localhost` 패턴 적용).
        run: bun x playwright test

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Upload production capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-capture-${{ github.run_id }}
          path: output/live-shots/color-palette-prod/
          retention-days: 7
          if-no-files-found: ignore
