name: prod-verify

# Production нҡҢк·Җ мһҗлҸҷнҷ” (2026-05-14).
# main push / мқјмқј schedule / мҲҳлҸҷ dispatch м„ё кІҪлЎңм—җм„ң н’ҖлҰј нҒҙлһҳмҠӨлҙҮ production URLм—җ
# Playwright hitн•ҳм—¬ мғүВ·chatВ·slider нҡҢк·ҖлҘј кІҖмҰқн•ңлӢӨ.
#
# лӘЁл…ёл ҲнҸ¬ м „нҷҳ (2026-05-27): src/** вҶ’ apps/classbot/** лЎң paths/working-directory к°ұмӢ .
#
# м„Өкі„ кІ°м •: Vercel API мқҳмЎҙ м—ҶмқҢ. VERCEL_TOKEN secret л¶Ҳмҡ”.
#  - GitHub вҶ” Vercel мһҗлҸҷ deploy webhookмқҙ мқҙлҜё webhookмңјлЎң main pushлҘј мһЎм•„мЈјлҜҖлЎң,
#    мқҙ мӣҢнҒ¬н”ҢлЎңмҡ°лҠ” "deploy мҷ„лЈҢ нӣ„ production URLмқҙ 200мқ„ мқ‘лӢөн•  л•Ңк№Ңм§Җ polling нӣ„
#    Playwright specмқ„ prod hitмңјлЎң 1нҡҢ лҸҢлҰ°лӢӨ" л§Ң мұ…мһ„.
#  - Vercel л°°нҸ¬ мғҒнғң мһҗмІҙлҘј кІҖмҰқн•  н•„мҡ”к°Җ мғқкё°л©ҙ нӣ„мҶҚ planм—җм„ң commit SHA мһ„лІ л“ң +
#    assert нҢЁн„ҙмңјлЎң л¶„лҰ¬.

on:
  push:
    branches: [main]
    # л№Ңл“ң мӮ°м¶ңл¬јм—җ мҳҒн–Ҙмқ„ мЈјлҠ” кІҪлЎңл§Ң нҠёлҰ¬кұ°. docs/scripts/proc/input-only PRмқҖ Vercelмқҙ
    # л№Ңл“ңлҘј skipн•ҳлҜҖлЎң SHA pollingмқҙ мҳҒмӣҗнһҲ мӢӨнҢЁн•ңлӢӨ (PR #59 нҡҢкі  вҶ’ 2026-05-18).
    paths:
      - 'apps/classbot/**'
      - 'packages/**'
      - 'package.json'
      - 'bun.lock'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.github/workflows/prod-verify.yml'
  schedule:
    # KST 08:00 = UTC 23:00. мқјмқј нҡҢк·Җ 1нҡҢ.
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  prod-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROD_URL: https://classbot.pullim.ai
      PLAYWRIGHT_BASE_URL: https://classbot.pullim.ai
      PROD_CAPTURE: '1'
      # лЈЁнҠё packageManager (`bun@1.3.12`) л°Ҹ ci.yml кіј мқјм№ҳмӢңнӮҙ вҖ” `latest` мӮ¬мҡ© мӢң
      # Bun м—…лҚ°мқҙнҠёл§ҢмңјлЎң lockfile н•ҙм„қ / workspace лҸҷмһ‘мқҙ л№„кІ°м •м ҒмңјлЎң к№Ём§Ҳ мҲҳ мһҲмқҢ
      BUN_VERSION: "1.3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/classbot
        run: bun x playwright install chromium --with-deps

      - name: Wait for production SHA match
        if: github.event_name == 'push'
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          # production HTMLмқҳ <meta name="x-build-sha" content="<sha>"> к°Җ expectedмҷҖ мқјм№ҳн•  л•Ңк№Ңм§Җ polling.
          # Vercel мһҗлҸҷ л№Ңл“ң ~30~120s + CDN м „нҢҢ вҶ’ мөңлҢҖ 10л¶„(120 Г— 5s) лҢҖкё°.
          # мқҙм „ patten(`/` 200 мқ‘лӢөл§Ң нҷ•мқё)мқҖ CDNмқҙ stale л№Ңл“ң м„ңл№ҷ мјҖмқҙмҠӨлҘј лӘ» мһЎм•ҳмқҢ.
          for i in $(seq 1 120); do
            html=$(curl -sS -L "$PROD_URL/classbot/chat" || true)
            current=$(echo "$html" | grep -oE 'name="x-build-sha" content="[^"]+"' | head -1 | sed 's/.*content="\(.*\)"/\1/')
            if [ "$current" = "$EXPECTED_SHA" ]; then
              echo "Production SHA matched (${EXPECTED_SHA:0:12}) after ${i} attempts."
              exit 0
            fi
            echo "Attempt ${i}/120 вҖ” expected=${EXPECTED_SHA:0:12} current=${current:0:12} (full=${current:-<no-meta>}), sleeping 5s."
            sleep 5
          done
          echo "::error title=prod-verify SHA mismatch::Production SHA did not match within 10 minutes"
          echo "  Expected SHA (this push):     ${EXPECTED_SHA}"
          echo "  Last observed production SHA: ${current:-<no-meta>}"
          if [ -n "$current" ] && [ "$current" != "<no-meta>" ]; then
            echo "  Production appears stuck at SHA ${current:0:12}."
            echo "  вҶ’ Check Vercel project Deployments for build failures or paused project state since that commit."
          else
            echo "  Production HTML had no x-build-sha meta вҖ” check production URL availability and x-build-sha embed in apps/classbot/app/layout.tsx."
          fi
          exit 1

      - name: Run Playwright against production
        # лӘЁл“  7 specмқҙ prod-safe (3 specмқҖ `process.env.PLAYWRIGHT_BASE_URL ?? localhost` нҢЁн„ҙ м Ғмҡ©).
        working-directory: apps/classbot
        run: bun x playwright test

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-trace-${{ github.run_id }}
          path: apps/classbot/test-results/
          retention-days: 7

      - name: Upload production capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-capture-${{ github.run_id }}
          path: apps/classbot/output/live-shots/color-palette-prod/
          retention-days: 7
          if-no-files-found: ignore
