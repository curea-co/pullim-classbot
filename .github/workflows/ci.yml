name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

  build:
    name: build (Next.js)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build

  # 주의: e2e job 은 classbot 의 playwright.config 가 외부 dev 서버를 전제 (webServer 블록 없음).
  # prod-verify.yml 이 prod hit 으로 e2e 회귀를 이미 책임지고 있어 ci 에서는 e2e 를 제외한다.
  # 로컬 e2e 가 필요해지면 playwright.config 에 webServer 블록 추가 + package.json 에 test:e2e 스크립트
  # 정의 후 별도 plan 으로 도입.
